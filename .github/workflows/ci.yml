# CI/CD Pipeline for Premium Store Bot
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.40
      
      - name: Run linter
        run: deno task lint
      
      - name: Run formatter check
        run: deno fmt --check
      
      - name: Run tests
        run: deno task test
      
      - name: Type check
        run: deno check bot.ts

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.40
      
      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: premium-store-bot
          entrypoint: bot.ts
          root: deno/
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
